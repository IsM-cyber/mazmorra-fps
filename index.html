<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mazmorra Wolfenstein – Arquitectura modular</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; cursor: none; }
        #info { position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 4px; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="info">WASD: mover | Espacio: saltar | Ratón: mirar | Clic: disparar | Q/E: girar | R: regenerar</div>

    <!-- Sprites externos -->
    <script src="sprites_pistola.js"></script>
    <script src="sprites_enemigo_idle.js"></script>
    <script src="sprites_enemigo_walk.js"></script>
    <script src="sprites_enemigo_attack.js"></script>
    <script src="sprites_enemigo_death.js"></script>

    <!-- Módulos del motor -->
    <script src="js/core/config.js"></script>
    <script src="js/core/game-state.js"></script>
    <script src="js/core/input.js"></script>
    <script src="js/engine/renderer.js"></script>
    <script src="js/engine/particles.js"></script>
    <script src="js/engine/audio.js"></script>
    <script src="js/engine/map-generator.js"></script>
    <script src="js/entities/enemy.js"></script>
    <script src="js/entities/player.js"></script>
    <script src="js/ui/hud.js"></script>
    <script src="js/core/main.js"></script>

    <!-- Lanzador -->
    <script>
        const canvas = document.getElementById('game');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        Main.start(canvas);
    </script>
</body>
</html>
